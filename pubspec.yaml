name: chess_auto_prep
description: Chess tactics trainer and PGN analyzer

publish_to: 'none'

version: 1.3.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Chess functionality
  dartchess: ^0.11.1

  # UI and state management
  cupertino_icons: ^1.0.6
  provider: ^6.1.1

  # File handling and HTTP
  file_picker: ^11.0.2
  http: ^1.1.2
  crypto: ^3.0.6  # SHA-256 for Lichess OAuth PKCE
  path_provider: ^2.1.1
  path_provider_linux: ^2.2.1
  flutter_svg: ^2.0.9
  csv: ^6.0.0
  share_plus: ^10.0.0  # For exporting/sharing tactics on mobile

  shared_preferences: ^2.5.3
  stockfish: ^1.7.1
  onnxruntime: ^1.4.1
  ffi: ^2.1.0

  # Persistent eval cache (desktop: Linux / macOS / Windows).
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.24
  cdbdirect_flutter_libs:
    path: packages/cdbdirect_flutter_libs
  path: ^1.9.0
  url_launcher: ^6.3.2
  fl_chart: ^1.2.0
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  fake_async: ^1.3.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/pieces/
    - assets/maia3_simplified.onnx
    - assets/data/all_moves_maia3.json
    - assets/data/all_moves_maia3_reversed.json
    - assets/executables/
    - assets/pgn_collections/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "knook.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "knook.png"