name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang libgtk-3-dev pkg-config

      - name: Remove non-Linux Stockfish binaries
        run: |
          rm -f assets/executables/stockfish-windows.exe.gz
          rm -f assets/executables/stockfish-macos.gz

      - name: Build Linux release
        run: flutter build linux --release

      - name: Zip bundle
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../chess-auto-prep-linux.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: chess-auto-prep-linux.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Remove non-Windows Stockfish binaries
        shell: pwsh
        run: |
          Remove-Item -Force assets/executables/stockfish-linux.gz -ErrorAction SilentlyContinue
          Remove-Item -Force assets/executables/stockfish-macos.gz -ErrorAction SilentlyContinue

      - name: Build Windows release
        run: flutter build windows --release

      - name: Zip bundle
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath chess-auto-prep-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: chess-auto-prep-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Remove non-macOS Stockfish binaries
        run: |
          rm -f assets/executables/stockfish-windows.exe.gz
          rm -f assets/executables/stockfish-linux.gz

      - name: Build macOS release
        run: flutter build macos --release

      - name: Zip app bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../chess-auto-prep-macos.zip *.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: chess-auto-prep-macos.zip

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
