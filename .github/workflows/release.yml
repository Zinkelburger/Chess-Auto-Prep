name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build clang libgtk-3-dev pkg-config git g++ make \
            libsnappy-dev liblz4-dev libzstd-dev libbz2-dev \
            libboost-fiber-dev libboost-context-dev libtbb-dev libjemalloc-dev zlib1g-dev

      - name: Cache TerarkDB + cdbdirect build
        uses: actions/cache@v4
        id: cdbdirect-cache
        with:
          path: packages/cdbdirect_flutter_libs/.build/deps
          key: cdbdirect-terarkdb-v1-${{ hashFiles('packages/cdbdirect_flutter_libs/scripts/build_native.sh', 'packages/cdbdirect_flutter_libs/src/cdbdirect_capi.cpp') }}
          restore-keys: |
            cdbdirect-terarkdb-v1-

      - name: Build bundled libcdbdirect.so
        run: |
          ./packages/cdbdirect_flutter_libs/scripts/build_native.sh --target linux-x64
          test -f packages/cdbdirect_flutter_libs/native/linux-x64/libcdbdirect.so

      - name: Remove non-Linux Stockfish binaries
        run: |
          rm -f assets/executables/stockfish-windows.exe.gz
          rm -f assets/executables/stockfish-macos.gz

      - name: Build Linux release
        run: flutter build linux --release

      # libcdbdirect.so dynamically links libraries end users won't have
      # (boost_fiber, TBB, jemalloc, snappy, ...). It is linked with an
      # $ORIGIN rpath, so copying them next to it makes them resolve both in
      # the zip and inside the Flatpak.
      - name: Bundle libcdbdirect runtime dependencies
        run: |
          BUNDLE_LIB=build/linux/x64/release/bundle/lib
          test -f "$BUNDLE_LIB/libcdbdirect.so"
          for dep in $(ldd "$BUNDLE_LIB/libcdbdirect.so" | awk '$3 ~ /^\// {print $3}'); do
            case "$(basename "$dep")" in
              libc.so*|libm.so*|libdl.so*|libpthread.so*|librt.so*|ld-linux*) continue ;;
              libgcc_s*|libstdc++*|libgomp*|libatomic*) continue ;;
            esac
            cp -vn "$dep" "$BUNDLE_LIB/"
          done

      - name: Zip bundle
        run: |
          cd build/linux/x64/release/bundle
          zip -r ../../../../../chess-auto-prep-${{ github.ref_name }}-linux.zip .

      - name: Install flatpak-builder
        run: sudo apt-get install -y flatpak flatpak-builder

      - name: Install Flatpak runtime
        run: |
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Build Flatpak bundle
        run: |
          flatpak-builder --user --force-clean --disable-rofiles-fuse --repo=flatpak-repo flatpak-build \
            packaging/flatpak/com.example.chess_auto_prep.yml
          flatpak build-bundle flatpak-repo \
            chess-auto-prep-${{ github.ref_name }}-linux.flatpak com.example.chess_auto_prep

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            chess-auto-prep-${{ github.ref_name }}-linux.zip
            chess-auto-prep-${{ github.ref_name }}-linux.flatpak

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Remove non-Windows Stockfish binaries
        shell: pwsh
        run: |
          Remove-Item -Force assets/executables/stockfish-linux.gz -ErrorAction SilentlyContinue
          Remove-Item -Force assets/executables/stockfish-macos.gz -ErrorAction SilentlyContinue

      - name: Build Windows release
        run: flutter build windows --release

      - name: Zip bundle
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath chess-auto-prep-${{ github.ref_name }}-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: chess-auto-prep-${{ github.ref_name }}-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Remove non-macOS Stockfish binaries
        run: |
          rm -f assets/executables/stockfish-windows.exe.gz
          rm -f assets/executables/stockfish-linux.gz

      - name: Build macOS release
        run: flutter build macos --release

      - name: Zip app bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../chess-auto-prep-${{ github.ref_name }}-macos.zip *.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: chess-auto-prep-${{ github.ref_name }}-macos.zip

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
