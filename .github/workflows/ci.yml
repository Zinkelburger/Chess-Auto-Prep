# Runs format check, static analysis, unit/widget tests, and integration tests.
# Only on tags (to conserve free Actions minutes) or manual dispatch from the
# Actions tab — day-to-day pushes rely on the local checks in CLAUDE.md.

name: CI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned so the formatter can't drift between stable releases and
      # start flagging files that are clean locally. Bump deliberately,
      # re-running `dart format` in the same commit if output changes.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang libgtk-3-dev pkg-config

      - run: flutter pub get

      - name: Check Dart formatting
        run: dart format --set-exit-if-changed lib test integration_test

      # Errors and warnings fail the job; info-level hints (e.g. avoid_print) do not.
      - name: Analyze (lib + test)
        run: flutter analyze lib test --no-fatal-infos

      - name: Run tests
        run: flutter test

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Install Linux desktop and display dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang libgtk-3-dev pkg-config xvfb

      - run: flutter pub get

      - name: Run integration tests (headless)
        timeout-minutes: 5
        run: xvfb-run flutter test integration_test/app_test.dart -d linux
